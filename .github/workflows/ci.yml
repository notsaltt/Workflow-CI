name: CI - MLflow Training & Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas numpy matplotlib dagshub

      # 4. Run MLflow Project (training)
      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject --env-manager=local

      # 5. Upload artefak ke GitHub
      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            confusion_matrix.png
            feature_importance.png
            roc_curve.png
            classification_report.txt

      # 6. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Build & Push Docker image
      - name: Build and Push Docker image
        run: |
          mlflow models build-docker \
            --model-uri "models:/random_forest_model/latest" \
            --name "${{ secrets.DOCKER_USERNAME }}/iris-mlflow:latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-mlflow:latest